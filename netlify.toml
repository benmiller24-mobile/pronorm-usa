[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# --- 301 Redirects for broken links (audit fix) ---

[[redirects]]
  from = "/equipment"
  to = "/product-lines/equipment"
  status = 301

[[redirects]]
  from = "/magazine/handleless-kitchen-design"
  to = "/magazine"
  status = 301

[[redirects]]
  from = "/magazine/kitchen-island-design-guide"
  to = "/magazine"
  status = 301

[[redirects]]
  from = "/terms"
  to = "/privacy"
  status = 301

[[redirects]]
  from = "/why-pronorm/german-vs-american"
  to = "/magazine/german-vs-american-kitchens"
  status = 301

# --- Catch-all 404 (must be last) ---

[[redirects]]
  from = "/*"
  to = "/404"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# HTML pages - don't cache, always serve fresh
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Hashed JS/CSS assets - cache long but Astro generates new hashes per build
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images - cache for 30 days
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# Videos - cache for 30 days
[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# PDF downloads - cache for 7 days
[[headers]]
  for = "/downloads/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Fonts - cache for 1 year
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
